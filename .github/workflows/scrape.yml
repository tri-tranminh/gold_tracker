name: Scrape gold prices (every 3 hours)

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours, UTC (VN time = UTC+7)
  workflow_dispatch: {}    # allow manual run from Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas pytz

      - name: Run scraper
        run: |
          python gold_scraper.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add gold_history.csv
            git commit -m "chore: update gold prices ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          else
            echo "No changes to commit."
          fi
